name: CI — build & smoke test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Keep Crawl4AI pinned because its /md API shape has changed between releases.
      VALKEY_IMAGE: valkey/valkey:8-alpine
      SEARXNG_IMAGE: searxng/searxng:latest
      CRAWL4AI_IMAGE: unclecode/crawl4ai:0.7.4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test dependencies
        run: pip install --quiet -r requirements-dev.txt

      - name: Python compile check
        run: python -m compileall mcp

      - name: Unit tests
        run: pytest -q

      - name: Bootstrap (.env + SEARXNG_SECRET)
        run: ./install.sh --skip-checks

      - name: Pull pinned upstream images (cache friendly)
        run: docker compose pull valkey searxng crawl4ai

      - name: Build & start stack
        run: docker compose up -d --build

      - name: Wait for services to be healthy
        run: |
          set -e
          deadline=$((SECONDS + 240))
          want="web-tool-valkey web-tool-searxng web-tool-crawl4ai"
          while :; do
            unhealthy=""
            for c in $want; do
              s=$(docker inspect -f '{{.State.Health.Status}}' "$c" 2>/dev/null || echo "missing")
              if [ "$s" != "healthy" ]; then unhealthy="$unhealthy $c=$s"; fi
            done
            # web-mcp has no healthcheck — just confirm it's running
            mcp_state=$(docker inspect -f '{{.State.Status}}' web-tool-mcp 2>/dev/null || echo "missing")
            if [ -z "$unhealthy" ] && [ "$mcp_state" = "running" ]; then
              echo "all services healthy"
              break
            fi
            if [ $SECONDS -ge $deadline ]; then
              echo "timed out waiting for services:$unhealthy mcp=$mcp_state" >&2
              docker compose ps
              exit 1
            fi
            echo "waiting…$unhealthy mcp=$mcp_state"
            sleep 5
          done

      - name: Smoke test (make smoke)
        run: make smoke

      - name: MCP end-to-end test (tools/list + web_extractor)
        run: |
          python - <<'PY'
          import asyncio
          from fastmcp import Client

          async def main():
              async with Client("http://localhost:8000/mcp") as c:
                  tools = {t.name for t in await c.list_tools()}
                  assert {"web_search", "web_extractor"} <= tools, f"missing tools: {tools}"
                  res = await c.call_tool("web_extractor", {"urls": "https://example.com", "mode": "fit"})
                  first = (res.data.get("results") or [{}])[0]
                  assert first.get("status") == "ok", f"extractor failed: {first}"
                  print("MCP e2e OK — tools:", sorted(tools), "words:", first.get("word_count"))

          asyncio.run(main())
          PY

      - name: Dump compose logs on failure
        if: failure()
        run: |
          echo "=== docker compose ps ==="
          docker compose ps || true
          echo "=== logs ==="
          docker compose logs --no-color --tail=200 || true

      - name: Tear down
        if: always()
        run: docker compose down -v || true
