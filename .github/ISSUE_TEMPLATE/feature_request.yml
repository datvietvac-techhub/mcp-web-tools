name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
      placeholder: "I want agents to ..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, interface, or configuration you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention other approaches or workarounds.
    validations:
      required: false
  - type: checkboxes
    id: impact
    attributes:
      label: Impact area
      options:
        - label: MCP tool contract
        - label: Search quality / SearXNG configuration
        - label: Extraction quality / Crawl4AI configuration
        - label: Docker Compose / deployment
        - label: Documentation
        - label: Developer workflow
